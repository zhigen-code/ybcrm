name = "crm-workers"
account_id = "31e3e7b5940076dd1813afe9c32a408d"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "crm-db"
database_id = "52b1a99e-9d18-4e45-8b80-bad871cb471c"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "crm-storage"

# 线索分配队列：既是 producer（crm 推送），也是 consumer（分配逻辑消费）
[[queues.producers]]
binding = "LEAD_ASSIGNMENT_QUEUE"
queue = "lead-assignment-queue"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notification-queue"

[[queues.consumers]]
queue = "lead-assignment-queue"
max_batch_size = 10
max_batch_timeout = 5

[[routes]]
pattern = "crmapi.irfc.cn"
custom_domain = true

[triggers]
crons = ["0 1 * * *"]   # 每天 UTC 01:00（北京时间 09:00）执行定时工作流

[dev]
port = 8787
