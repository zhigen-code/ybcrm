name = "zhigen-crm-main"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "zhigen-crm-main-db"
database_id = "b695a83e-ffea-4232-9e66-1c7583927b7e"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "zhigen-crm-main-store"

[[queues.producers]]
binding = "LEAD_ASSIGNMENT_QUEUE"
queue = "zhigen-crm-main-leads"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "zhigen-crm-main-notify"

[[queues.consumers]]
queue = "zhigen-crm-main-leads"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "zhigen-crm-main-notify"
max_batch_size = 20
max_batch_timeout = 10

[triggers]
crons = ["0 1 * * *"]

[dev]
port = 8787
