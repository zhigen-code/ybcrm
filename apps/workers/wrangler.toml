name = "placeholder-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "placeholder-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "placeholder-store"

[[queues.producers]]
binding = "LEAD_ASSIGNMENT_QUEUE"
queue = "placeholder-leads"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "placeholder-notify"

[[queues.consumers]]
queue = "placeholder-leads"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "placeholder-notify"
max_batch_size = 20
max_batch_timeout = 10

[ai]
binding = "AI"

[triggers]
crons = ["0 1 * * *"]

[dev]
port = 8787
