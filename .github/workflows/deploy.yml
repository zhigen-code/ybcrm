name: Deploy

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check setup completed
        run: |
          WORKER=$(grep -m1 '^name' apps/workers/wrangler.toml | cut -d'"' -f2)
          if [ "$WORKER" = "placeholder-worker" ]; then
            echo "❌ Run the Setup workflow first"
            exit 1
          fi
          DB_NAME=$(grep 'database_name' apps/workers/wrangler.toml | head -1 | cut -d'"' -f2)
          echo "WORKER_NAME=$WORKER" >> $GITHUB_ENV
          echo "D1_DATABASE_NAME=$DB_NAME" >> $GITHUB_ENV
          echo "Worker: $WORKER / DB: $DB_NAME"

      - name: Deploy Workers
        working-directory: apps/workers
        run: npx wrangler deploy

      - name: Run D1 migrations
        working-directory: apps/workers
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check setup completed
        run: |
          WORKER=$(grep -m1 '^name' apps/workers/wrangler.toml | cut -d'"' -f2)
          if [ "$WORKER" = "placeholder-worker" ]; then
            echo "❌ Run the Setup workflow first"
            exit 1
          fi
          echo "PAGES_PROJECT_NAME=$WORKER" >> $GITHUB_ENV

      - name: Build
        run: pnpm --filter web build

      - name: Deploy Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name "$PAGES_PROJECT_NAME" --branch main --commit-message "deploy ${{ github.sha }}"
