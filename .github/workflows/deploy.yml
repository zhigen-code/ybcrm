name: Deploy

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_NAME: ${{ vars.WORKER_NAME }}
  D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
  D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
  R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
  LEAD_QUEUE_NAME: ${{ vars.LEAD_QUEUE_NAME }}
  NOTIFY_QUEUE_NAME: ${{ vars.NOTIFY_QUEUE_NAME }}

jobs:
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Workers
        working-directory: apps/workers
        run: npx wrangler deploy

      - name: Run D1 migrations
        working-directory: apps/workers
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: pnpm --filter web build

      - name: Deploy Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name "${{ vars.PAGES_PROJECT_NAME }}" --branch main --commit-message "deploy ${{ github.sha }}"
