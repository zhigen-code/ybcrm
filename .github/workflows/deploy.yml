name: Deploy

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Workers
        working-directory: apps/workers
        run: npx wrangler deploy

      - name: Run D1 migrations
        working-directory: apps/workers
        run: npx wrangler d1 migrations apply crm-db --remote

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build

      - name: Deploy Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_ACCOUNT_ID: 31e3e7b5940076dd1813afe9c32a408d
        run: npx wrangler pages deploy dist --project-name crm-web --branch main --commit-message "deploy ${{ github.sha }}"
