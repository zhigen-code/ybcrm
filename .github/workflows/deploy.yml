name: Deploy

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load Cloudflare config
        run: |
          [ -f .github/cloudflare.env ] || (echo "Run the Setup workflow first" && exit 1)
          cat .github/cloudflare.env >> $GITHUB_ENV

      - name: Resolve wrangler.toml
        run: |
          set -a; source .github/cloudflare.env; set +a
          envsubst < apps/workers/wrangler.toml > /tmp/wrangler.toml && cp /tmp/wrangler.toml apps/workers/wrangler.toml

      - name: Deploy Workers
        working-directory: apps/workers
        run: npx wrangler deploy

      - name: Run D1 migrations
        working-directory: apps/workers
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load Cloudflare config
        run: |
          [ -f .github/cloudflare.env ] || (echo "Run the Setup workflow first" && exit 1)
          cat .github/cloudflare.env >> $GITHUB_ENV

      - name: Build
        run: pnpm --filter web build

      - name: Deploy Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name "$PAGES_PROJECT_NAME" --branch main --commit-message "deploy ${{ github.sha }}"
