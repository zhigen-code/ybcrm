name: Deploy

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load config & patch wrangler.toml
        run: |
          [ -f .github/cloudflare.env ] || (echo "Run the Setup workflow first" && exit 1)
          set -a; source .github/cloudflare.env; set +a
          cat .github/cloudflare.env >> $GITHUB_ENV
          cd apps/workers
          sed -i "s/placeholder-worker/$WORKER_NAME/" wrangler.toml
          sed -i "s/00000000-0000-0000-0000-000000000000/$D1_DATABASE_ID/" wrangler.toml
          sed -i "s/placeholder-db/$D1_DATABASE_NAME/" wrangler.toml
          sed -i "s/placeholder-store/$R2_BUCKET_NAME/" wrangler.toml
          sed -i "s/placeholder-leads/$LEAD_QUEUE_NAME/g" wrangler.toml
          sed -i "s/placeholder-notify/$NOTIFY_QUEUE_NAME/g" wrangler.toml

      - name: Deploy Workers
        working-directory: apps/workers
        run: npx wrangler deploy

      - name: Run D1 migrations
        working-directory: apps/workers
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load config
        run: |
          [ -f .github/cloudflare.env ] || (echo "Run the Setup workflow first" && exit 1)
          cat .github/cloudflare.env >> $GITHUB_ENV

      - name: Build
        run: pnpm --filter web build

      - name: Deploy Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name "$PAGES_PROJECT_NAME" --branch main --commit-message "deploy ${{ github.sha }}"
