name: 🚀 Setup (Run Once)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Create Cloudflare resources & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 步骤 1：计算资源命名前缀 ──────────────────────────────────────
      - name: Compute resource names
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]' | sed 's/[-_].*//' | cut -c1-8)
          repo=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[-_].*//' | cut -c1-8)
          branch=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-10)
          PREFIX="${owner}-${repo}-${branch}"
          echo "WORKER_NAME=${PREFIX}"              >> $GITHUB_ENV
          echo "D1_DATABASE_NAME=${PREFIX}-db"      >> $GITHUB_ENV
          echo "R2_BUCKET_NAME=${PREFIX}-store"     >> $GITHUB_ENV
          echo "PAGES_PROJECT_NAME=${PREFIX}"       >> $GITHUB_ENV
          echo "LEAD_QUEUE_NAME=${PREFIX}-leads"    >> $GITHUB_ENV
          echo "NOTIFY_QUEUE_NAME=${PREFIX}-notify" >> $GITHUB_ENV
          echo "Prefix: $PREFIX"

      # ── 步骤 2：创建 D1 数据库 ────────────────────────────────────────
      - name: Create D1 database
        working-directory: apps/workers
        run: |
          npx wrangler d1 create "$D1_DATABASE_NAME" 2>&1 || true
          DB_LIST=$(npx wrangler d1 list --json)
          D1_ID=$(echo "$DB_LIST" | jq -r --arg name "$D1_DATABASE_NAME" '.[] | select(.name==$name) | .uuid')
          if [ -z "$D1_ID" ]; then
            echo "❌ Failed to create or find database: $D1_DATABASE_NAME"
            exit 1
          fi
          echo "D1_DATABASE_ID=$D1_ID" >> $GITHUB_ENV
          echo "✅ Database: $D1_DATABASE_NAME ($D1_ID)"

      # ── 步骤 3：创建 R2 存储桶（CF REST API，已存在则跳过）────────────
      - name: Create R2 bucket
        run: |
          BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          RESP=$(curl -s -X POST "$BASE/r2/buckets" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"$R2_BUCKET_NAME\"}")
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          MSG=$(echo "$RESP" | jq -r '.errors[0].message // "ok"')
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ R2: $R2_BUCKET_NAME"
          elif echo "$MSG" | grep -qi "already exist"; then
            echo "✅ R2 already exists: $R2_BUCKET_NAME"
          else
            echo "❌ Failed to create R2 bucket: $MSG"
            exit 1
          fi

      # ── 步骤 4：创建队列（CF REST API）───────────────────────────────
      - name: Create Queues
        run: |
          BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          for QUEUE in "$LEAD_QUEUE_NAME" "$NOTIFY_QUEUE_NAME"; do
            RESP=$(curl -s -X POST "$BASE/queues" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"queue_name\": \"$QUEUE\"}")
            SUCCESS=$(echo "$RESP" | jq -r '.success')
            MSG=$(echo "$RESP" | jq -r '.errors[0].message // "ok"')
            echo "Queue $QUEUE: $SUCCESS / $MSG"
          done
          sleep 2

      # ── 步骤 5：patch wrangler.toml & 部署 Worker（新账号首次部署会自动激活 workers.dev 子域名）
      - name: Patch wrangler.toml & deploy Workers
        working-directory: apps/workers
        run: |
          sed -i "s/placeholder-worker/$WORKER_NAME/" wrangler.toml
          sed -i "s/00000000-0000-0000-0000-000000000000/$D1_DATABASE_ID/" wrangler.toml
          sed -i "s/placeholder-db/$D1_DATABASE_NAME/" wrangler.toml
          sed -i "s/placeholder-store/$R2_BUCKET_NAME/" wrangler.toml
          sed -i "s/placeholder-leads/$LEAD_QUEUE_NAME/g" wrangler.toml
          sed -i "s/placeholder-notify/$NOTIFY_QUEUE_NAME/g" wrangler.toml
          npx wrangler deploy

      # ── 步骤 6：获取 workers.dev 子域名（部署后子域名必然存在）────────
      - name: Get workers.dev subdomain
        run: |
          SUBDOMAIN=$(curl -sf "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result.subdomain // empty')
          if [ -z "$SUBDOMAIN" ]; then
            echo "❌ Could not get workers.dev subdomain after deploy"
            exit 1
          fi
          echo "VITE_API_BASE_URL=https://${WORKER_NAME}.${SUBDOMAIN}.workers.dev" >> $GITHUB_ENV
          echo "Workers URL: https://${WORKER_NAME}.${SUBDOMAIN}.workers.dev"

      # ── 步骤 7：写入 Worker Secrets ───────────────────────────────────
      - name: Set Worker secrets
        working-directory: apps/workers
        run: |
          echo "$(openssl rand -base64 32)" | npx wrangler secret put JWT_SECRET
          echo "$(openssl rand -base64 32)" | npx wrangler secret put PORTAL_JWT_SECRET

      # ── 步骤 8：执行数据库迁移 ───────────────────────────────────────
      - name: Run D1 migrations
        working-directory: apps/workers
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

      # ── 步骤 9：构建前端（临时写 .env.production，不 commit）─────────
      - name: Build web
        run: |
          echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" > apps/web/.env.production
          pnpm --filter web build

      # ── 步骤 10：创建并部署 Pages ─────────────────────────────────────
      - name: Create Pages project
        working-directory: apps/web
        run: |
          npx wrangler pages project create "$PAGES_PROJECT_NAME" --production-branch main \
            && echo "✅ Pages project: $PAGES_PROJECT_NAME" \
            || echo "Pages project may already exist, continuing..."

      - name: Deploy Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name "$PAGES_PROJECT_NAME" --branch main

      - name: Done
        run: |
          echo "✅ Setup complete!"
          echo "   Workers API : $VITE_API_BASE_URL"
          echo "   Pages URL   : https://${PAGES_PROJECT_NAME}.pages.dev"
